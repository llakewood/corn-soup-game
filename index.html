<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Corn Soup — A Story of Community</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Lora:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #0f0b04; overflow: hidden; }
    #game-container { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
    canvas { max-width: 100%; max-height: 100%; }

    #loader {
      position: fixed; inset: 0; z-index: 100;
      background: #0f0b04;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      transition: opacity 0.8s ease;
    }
    #loader.hidden { opacity: 0; pointer-events: none; }
    #loader h1 {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 600; font-size: 28px; letter-spacing: 0.12em;
      color: #d4b896; text-transform: uppercase; margin-bottom: 6px;
    }
    #loader p {
      font-family: 'Lora', Georgia, serif;
      font-size: 13px; color: #7a6548; font-style: italic;
    }
    #loader .bar-track {
      width: 180px; height: 2px; background: #2a1f12;
      margin-top: 32px; border-radius: 1px; overflow: hidden;
    }
    #loader .bar-fill {
      height: 100%; width: 0%; background: #c0956a;
      animation: load-pulse 1.8s ease-in-out infinite;
    }
    @keyframes load-pulse {
      0%, 100% { width: 15%; margin-left: 0; }
      50% { width: 60%; margin-left: 20%; }
    }
  </style>
</head>
<body>
  <div id="loader">
    <h1>Corn Soup</h1>
    <p>A Story of Community</p>
    <div class="bar-track"><div class="bar-fill"></div></div>
  </div>
  <div id="game-container"></div>
  <script src="game.js"></script>
</body>
</html>
